<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Новостной агрегатор{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/custom.css?v=2" rel="stylesheet">
</head>
<body>
  {% if admin %}
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <i class="bi bi-newspaper"></i> Новостной агрегатор
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path == '/' }}" href="/"
               {% if request.url.path == '/' %}aria-current="page"{% endif %}>Дашборд</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path.startswith('/sources') }}" href="/sources"
               {% if request.url.path.startswith('/sources') %}aria-current="page"{% endif %}>Источники</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path.startswith('/posts') }}" href="/posts"
               {% if request.url.path.startswith('/posts') %}aria-current="page"{% endif %}>Посты</a>
          </li>
          {% if admin.role == "admin" %}
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path.startswith('/admins') }}" href="/admins"
               {% if request.url.path.startswith('/admins') %}aria-current="page"{% endif %}>Модераторы</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path.startswith('/settings') }}" href="/settings"
               {% if request.url.path.startswith('/settings') %}aria-current="page"{% endif %}>Настройки</a>
          </li>
          {% endif %}
          <li class="nav-item">
            <a class="nav-link {{ 'active' if request.url.path.startswith('/logs') }}" href="/logs"
               {% if request.url.path.startswith('/logs') %}aria-current="page"{% endif %}>Логи</a>
          </li>
        </ul>
        <span class="navbar-text me-3">{{ admin.username }} <span class="opacity-75">({{ admin.role }})</span></span>
        <form method="post" action="/logout" class="d-flex">
          <button class="btn btn-outline-light btn-sm" type="submit">Выйти</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}
  <div class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
